id: xiaomi-sm8250-lmi
name: Xiaomi sm8250 lmi family
arch: arm64
kernel:
  repo: https://github.com/crdroidandroid/android_kernel_xiaomi_sm8250
  branch: 16.0-lmi
  version_hint: '4.19'
  defconfig: arch/arm64/configs/lmi_defconfig
  image: Image.gz-dtb
  dtbo: dtbo.img
android:
  release_hint: '16'
  rom_hint: crDroid
container:
  default_cgroup_mode: v1
  profiles:
    - android-container-host-v1
    - docker-bridge-overlay2
  docker_storage_driver: overlay2
network:
  docker_bridge: docker0
  docker_subnet: 172.31.0.0/16
  default_address_pool: 172.30.0.0/16
  uplink_auto_detect: true
patches:
  cgroup_noprefix_compat: auto
  xt_qtaguid_container_safe: auto
  android_paranoid_network: config
runtime:
  mode: kernelsu-module
  cgroup_mode: v1
  protect_daemons_from_lmkd: true
  selinux_mode: detect
  docker_daemon_config: runtime/android/docker/daemon.cgroup-v1.json
  nat_manager: runtime/android/net/container-nat-manager.sh
known_limitations:
  - xt_qtaguid_container_safe is placeholder until a safe reviewed patch exists
  - cgroup v2 remains optional for this 4.19 vendor kernel
